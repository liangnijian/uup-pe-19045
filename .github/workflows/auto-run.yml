name: 自动运行

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: 检查是否生成了 ISO
        run: if not exist *.iso (exit /b 1)
        shell: cmd

      - name: 整合 uup
        run: .\auto-run.cmd uup
        shell: cmd

      - name: 上传 iso
        uses: actions/upload-artifact@v6
        with:
          name: iso
          path: "*.iso"

      - name: 制作 WinPE
        run: .\auto-run.cmd pe
        shell: cmd

      - name: 上传 wim
        uses: actions/upload-artifact@v6
        with:
          name: WinPE
          path: "*.wim"
